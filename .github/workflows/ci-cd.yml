# Пример для GitHub Actions (Node.js проект)
name: CI/CD Pipeline
on:
  push:
    branches: [ main, test, backend ]
  pull_request:
    branches: [ main ]
    
jobs:
  ci:
    name: "CI: Lint, Test & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./FullStack(v0.1)/shop-backend(v1.2)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./FullStack(v0.1)/shop-backend(v1.2)/package-lock.json
      
      - name: Install dependencies
        run: npm ci

      - name: Fix permissions
        run: chmod +x node_modules/.bin/eslint

      - name: Run linter
        run: npm run lint
      
      - name: Run unit tests
        run: npm test
      
      # - name: Build project
      #   run: npm run Build
  
  cd:
    name: "CD: Pull, Build, & Run"
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~/Click_Store/FullStack\(v0.1\)/shop-backend\(v1.2\)
            git pull
            npm ci --production
            pm2 restart shop-backend || pm2 start server.js --name shop-backend
      
      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            # Проверить версию Node.js
            node --version
            
            cd ~/Click_Store/FullStack\(v0.1\)/Frontend\(v0.4\)/Click_Store-Frontend/Frontend
            git pull
            
            # Очистить кэш npm (на всякий случай)
            npm cache clean --force
            
            # Установить зависимости
            npm ci
            
            # Собрать проект
            npm run build
            
            # Очистить старые файлы и скопировать новые
            sudo mkdir -p /var/www/html # если этого файла не было
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/