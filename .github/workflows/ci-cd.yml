# Пример для GitHub Actions (Node.js проект)
name: CI/CD Pipeline
on:
  push:
    branches: [ main, test, backend ]
  pull_request:
    branches: [ main ]
jobs:
  ci:
    name: "CI: Lint, Test & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./FullStack(v0.1)/shop-backend(v1.2)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./FullStack(v0.1)/shop-backend(v1.2)/package-lock.json
      
      - name: Install dependencies
        run: npm ci

      - name: Fix permissions
        run: chmod +x node_modules/.bin/eslint

      - name: Run linter
        run: npm run lint
      
      - name: Run unit tests
        run: npm test
      
      # - name: Build project
      #   run: npm run Build
  
  cd:
    name: "CD: Pull, Start & Restart"
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts
      
      - name: Deploy Backend
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_IP: ${{ secrets.VM_IP }}
        run: |
          ssh $VM_USER@$VM_IP "
            cd ~/Click_Store/FullStack\(v0.1\)/shop-backend\(v1.2\)
            git pull
            npm ci --production
            pm2 restart shop-backend || pm2 start server.js --name shop-backend
          "
      
      - name: Deploy Frontend
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_IP: ${{ secrets.VM_IP }}
        run: |
          ssh $VM_USER@$VM_IP "
            cd ~/Click_Store/FullStack\(v0.1\)/Frontend\(v0.4\)/Click_Store-Frontend/Frontend
            git pull
            npm ci
            npm run build
            sudo cp -r dist/* /var/www/html/
          "