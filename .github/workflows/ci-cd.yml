# Пример для GitHub Actions (Node.js проект)
name: CI/CD Pipeline
on:
  push:
    branches: [ main, test, backend ]
  pull_request:
    branches: [ main ]
jobs:
  ci:
    name: "CI: Lint, Test & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./FullStack(v0.1)/shop-backend(v1.2)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linter
        run: npm run lint
      
      - name: Run unit tests
        run: npm test
      
      - name: Build project
        run: npm run Build
