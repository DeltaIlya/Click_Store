name: CI/CD Pipeline

on:
  push:
    branches: [main, test, backend]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: "CI: Lint, Test & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./FullStack(v0.1)/shop-backend(v1.2)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./FullStack(v0.1)/shop-backend(v1.2)/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fix permissions
        run: chmod +x node_modules/.bin/eslint

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test

  cd:
    name: "CD: Deploy Backend & Frontend"
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Deploy Backend ----------
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e

            BACKEND_DIR="$HOME/Click_Store/FullStack(v0.1)/shop-backend(v1.2)"

            cd "$BACKEND_DIR"

            git pull origin main

            npm ci --production

            if pm2 list | grep -q "shop-backend"; then
              pm2 restart shop-backend
            else
              pm2 start server.js --name shop-backend
            fi

            pm2 save

